apiVersion: v1                               # Core Kubernetes API group
kind: Service                                # Stable virtual IP + DNS name for Prometheus
metadata:
  name: "{{ .Release.Name }}-server"            # Service name (ex: prometheus-server)
  namespace: {{ .Values.namespace }}          # Namespace (ex: monitoring)
spec:
  type: ClusterIP                             # Internal-only service (not exposed to internet)
  selector:
    app: "{{ .Release.Name }}-server"            # Picks the Prometheus pods with this label
  ports:
    - name: http                              # Named port (lets targetPort reference "http")
      port: 9090                              # Service port clients use inside cluster
      targetPort: http                        # Forwards to the pod container port named "http"
  # Purpose:
  # - Gives Prometheus a stable DNS name: <service>.<namespace>.svc
  # - Grafana will query Prometheus through this Service
  # - You can also kubectl port-forward this Service for local access