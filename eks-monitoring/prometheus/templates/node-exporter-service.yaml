apiVersion: v1                                   # Core Kubernetes API
kind: Service                                    # Stable network endpoint for a set of pods
metadata:
  name: "{{ .Release.Name }}-node-exporter"        # Service name (Helm release prefix)
  namespace: {{ .Values.namespace }}             # Namespace (ex: monitoring)
  annotations:
    prometheus.io/scrape: "true"                 # Hint for Prometheus: this service has metrics
    prometheus.io/port: "9100"                   # Hint: scrape this port

spec:
  type: ClusterIP                                # Internal-only service (inside cluster)
  selector:
    app: "{{ .Release.Name }}-node-exporter"       # Selects pods with this label (from the DaemonSet)
  ports:
    - name: metrics                              # Named port (nice for targetPort referencing)
      port: 9100                                 # Service port Prometheus connects to
      targetPort: metrics                        # Forwards to container port named "metrics" (9100)


# SUMMARY:
# This Service groups all node-exporter pods (one per node) behind a stable DNS name.
# Prometheus can scrape one Service endpoint and Kubernetes load-balances/targets the node-exporter pods automatically.