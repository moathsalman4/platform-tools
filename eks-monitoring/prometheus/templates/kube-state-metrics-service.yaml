apiVersion: v1                                           # Core Kubernetes API
kind: Service                                            # Stable DNS/IP that routes to matching pods
metadata:
  name: "{{ .Release.Name }}-kube-state-metrics"            # Service name (Helm release scoped)
  namespace: {{ .Values.namespace }}                      # Namespace (ex: monitoring)
  annotations:
    prometheus.io/scrape: "true"                          # Lets Prometheus auto-discover this target (service/endpoints job)
    prometheus.io/port: "8080"                            # Tells Prometheus which port to scrape

spec:
  type: ClusterIP                                         # Internal-only service (not exposed to the internet)
  selector:
    app: "{{ .Release.Name }}-kube-state-metrics"            # Route traffic to pods with this label
  ports:
    - name: metrics
      port: 8080                                          # Service port inside cluster
      targetPort: metrics                                 # Maps to container port named "metrics" (8080)
    - name: telemetry
      port: 8081                                          # Service port for telemetry/readiness endpoints
      targetPort: telemetry                               # Maps to container port named "telemetry" (8081)


# SUMMARY:
# This Service provides a stable in-cluster endpoint for kube-state-metrics pods.
# Prometheus can scrape metrics through this Service (port 8080) using service/endpoints discovery,
# while telemetry/health endpoints are exposed on port 8081.