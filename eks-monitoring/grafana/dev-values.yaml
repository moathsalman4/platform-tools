namespace: monitoring

grafana:
  image:
    repository: grafana/grafana
    tag: "11.1.0"

  # AWS Secrets Manager secret name created by Terraform (Grafana admin creds)
  secretsManagerSecretName: "projectx_cluster_ubuntu25b-grafana-admin-creds"
  
  # Prometheus service URL inside the cluster (already running in monitoring namespace)
  datasourceUrl: "http://prometheus-server.monitoring:9090"
  
  # IRSA role ARN created by Terraform (pod assumes this to read Secrets Manager)
  irsaRoleArn: "arn:aws:iam::665832051028:role/projectx_cluster_ubuntu25b-grafana-role" 

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  ingress:
    hostname: "grafana.example.com" # placeholder until you pick your real domain
    whitelistSourceRange: "108.71.132.112/32"

# MINI SUMMARY
# This values file installs Grafana into the "monitoring" namespace.
# Grafana runs version 11.1.0, connects to Prometheus using the in-cluster Service URL,
# and pulls admin credentials from AWS Secrets Manager using IRSA + the Secrets Store CSI driver.
# Grafana is exposed via Ingress at grafana.example.com and access is locked down to your /32 IP.