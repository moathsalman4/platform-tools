apiVersion: v1 # Core API
kind: ServiceAccount # Identity that pods use
metadata:
  name: {{ .Release.Name }}-sa # Deployment references this exact name
  namespace: {{ .Values.namespace }} # e.g. monitoring
  {{- with .Values.grafana }}
  {{- with .irsaRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }} # IRSA role for AWS access (Secrets Manager via CSI)
  {{- end }}
  {{- end }}

# summary:
#   what_this_file_does: "Creates the ServiceAccount Grafana runs as, and attaches IRSA role ARN if provided."
#   key_point: "If grafana.irsaRoleArn is empty/missing, annotations are not rendered (still valid YAML)."