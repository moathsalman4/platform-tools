apiVersion: v1 # Core API
kind: ServiceAccount # Identity that pods use
metadata:
  name: "{{ .Release.Name }}-sa" # Deployment references this exact name
  namespace: {{ .Values.namespace }} # monitoring
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.grafana.irsaRoleArn }} # IRSA: pod assumes this IAM role via OIDC


# summary:
#   what_this_file_does: "Creates the ServiceAccount Grafana runs as, and attaches an IAM role using IRSA."
#   key_point: "Without this annotation, the pod cannot read AWS Secrets Manager through the CSI driver."