apiVersion: v1 # Core Kubernetes API
kind: ConfigMap # Stores Grafana datasource provisioning file
metadata:
  name: "{{ .Release.Name }}-datasource" # MUST match the Deployment volume reference
  namespace: {{ .Values.namespace }} # Same namespace as Grafana
data:
  datasource.yaml: | # This creates a file named datasource.yaml inside the pod
    apiVersion: 1 # Grafana provisioning format version
    datasources:
      - name: Prometheus # Name that appears in Grafana UI
        type: prometheus # Datasource type
        access: proxy # Grafana server connects to Prometheus (browser does not)
        url: {{ .Values.grafana.datasourceUrl | quote }} # Points to Prometheus service DNS in-cluster
        isDefault: true # Make this the default datasource
        editable: false # Prevent edits in UI (good for consistency)


# MINI SUMMARY (ConfigMaps)
# 1) configmap-datasource.yaml:
#    - Creates Grafana's Prometheus datasource automatically.
#    - Uses the in-cluster service URL (prometheus-server.monitoring:9090).
