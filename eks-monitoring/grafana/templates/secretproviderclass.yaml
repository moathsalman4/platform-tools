apiVersion: secrets-store.csi.x-k8s.io/v1 # CRD API for Secrets Store CSI objects
kind: SecretProviderClass # Defines how to fetch secrets from an external provider (AWS)
metadata:
  name: "{{ .Release.Name }}-admin-creds" # Referenced by the Deployment volumeAttributes
  namespace: {{ .Values.namespace }} # Must be same namespace as the pod
spec:
  provider: aws # Use the AWS provider (you installed it already)
  parameters:
    objects: | # YAML-as-string that tells AWS provider what to fetch
      - objectName: "{{ .Values.grafana.secretsManagerSecretName }}" # AWS Secrets Manager secret name (must exist)
        objectType: "secretsmanager" # Source type is Secrets Manager
        jmesPath: # Extract fields out of JSON secret_string
          - path: "username" # Read the "username" field from the secret JSON
            objectAlias: "admin-user" # Save it as admin-user
          - path: "password" # Read the "password" field from the secret JSON
            objectAlias: "admin-password" # Save it as admin-password

  secretObjects: # OPTIONAL BUT IMPORTANT: also create a Kubernetes Secret from those extracted values
    - secretName: "{{ .Release.Name }}-credentials" # This is what the Deployment references via secretKeyRef
      type: Opaque
      data:
        - objectName: admin-user # From objectAlias above
          key: admin-user # Key name inside Kubernetes Secret
        - objectName: admin-password # From objectAlias above
          key: admin-password # Key name inside Kubernetes Secret


# summary:
#   what_this_file_does: "Pulls Grafana admin credentials from AWS Secrets Manager and turns them into a Kubernetes Secret."
#   key_point: "It extracts username/password from the AWS secret JSON using jmesPath."