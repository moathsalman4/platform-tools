apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eck-stack
  namespace: logging
spec:
  interval: 10m
  releaseName: eck-stack
  targetNamespace: logging
  chart:
    spec:
      chart: eck-stack
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: flux-system
  values:
    eck-elasticsearch:
      enabled: true
      fullnameOverride: elasticsearch
      version: 9.1.4
      nodeSets:
        - name: default
          count: 1
          config:
            node.store.allow_mmap: false

    eck-kibana:
      enabled: true
      fullnameOverride: kibana
      version: 9.1.4
      count: 1
      elasticsearchRef:
        name: elasticsearch

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
  namespace: logging
spec:
  interval: 10m
  releaseName: fluent-bit
  targetNamespace: logging
  chart:
    spec:
      chart: fluent-bit
      sourceRef:
        kind: HelmRepository
        name: fluent
        namespace: flux-system
  values:
    config:
      outputs: |
        [OUTPUT]
            Name              es
            Match             *
            Host              elasticsearch-es-http.logging.svc.cluster.local
            Port              9200
            Index             kubernetes-logs
            Suppress_Type_Name On
            tls               Off